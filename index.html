<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caixa de emergência</title>
  <style>
    :root {
      --bg: #111827;
      --panel: #1f2937;
      --panel2: #374151;
      --text: #f9fafb;
      --muted: #cbd5e1;
      --accent: #22c55e;
      --danger: #ef4444;
      --button: #2563eb;
      --button2: #4f46e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
    }
    h1 {
      font-size: 24px;
      margin: 8px 0 12px;
      text-align: center;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      border: none;
      border-radius: 12px;
      padding: 14px 8px;
      color: var(--text);
      background: var(--panel2);
      font-weight: bold;
      font-size: 14px;
    }
    .tab-btn.active { background: var(--accent); color: #052e16; }
    .section { display: none; }
    .section.active { display: block; }
    .products {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .product-btn {
      min-height: 72px;
      border: none;
      border-radius: 16px;
      background: var(--button);
      color: white;
      font-size: 16px;
      font-weight: bold;
      padding: 10px;
      box-shadow: 0 4px 0 rgba(0,0,0,.25);
    }
    .product-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.25); }
    .kg-btn { background: var(--button2); }
    .cart {
      margin-top: 16px;
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
    }
    .cart-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .cart-title h2 { margin: 0; font-size: 20px; }
    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid #4b5563;
      padding: 10px 0;
      font-size: 15px;
    }
    .cart-item:last-child { border-bottom: none; }
    .remove-btn {
      border: none;
      border-radius: 10px;
      background: var(--danger);
      color: white;
      font-weight: bold;
      padding: 8px 10px;
    }
    .total {
      margin-top: 12px;
      padding: 14px;
      border-radius: 14px;
      background: #052e16;
      color: #dcfce7;
      text-align: center;
      font-size: 28px;
      font-weight: bold;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }
    .action-btn {
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      color: white;
    }
    .clear-btn { background: var(--danger); }
    .save-btn { background: var(--accent); color: #052e16; }
    .history {
      margin-top: 12px;
      background: var(--panel);
      border-radius: 16px;
      padding: 12px;
    }
    .history h2 { margin: 0 0 8px; font-size: 18px; }
    .history-item {
      color: var(--muted);
      border-bottom: 1px solid #4b5563;
      padding: 8px 0;
      font-size: 14px;
    }
    dialog {
      border: none;
      border-radius: 18px;
      padding: 18px;
      width: min(92vw, 420px);
      background: #f9fafb;
      color: #111827;
    }
    dialog h2 { margin-top: 0; }
    dialog input {
      width: 100%;
      font-size: 22px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #9ca3af;
      margin: 8px 0 12px;
    }
    .dialog-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .dialog-buttons button {
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
    }
    .note { color: var(--muted); font-size: 13px; text-align: center; margin: 8px 0; }
  </style>
</head>
<body>
  <h1>Caixa de emergência</h1>
  <div class="note">Preços em euros — funciona offline</div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('gelados', this)">GELADOS</button>
    <button class="tab-btn" onclick="showTab('frappe', this)">FRAPPE/AGUA</button>
    <button class="tab-btn" onclick="showTab('cafe', this)">CAFE</button>
  </div>

  <section id="gelados" class="section active">
    <div class="products">
      <button class="product-btn" onclick="addItem('1 BOLA', 2.90)">1 BOLA<br>2,90€</button>
      <button class="product-btn" onclick="addItem('2 BOLAS', 4.00)">2 BOLAS<br>4,00€</button>
      <button class="product-btn" onclick="addItem('3 BOLAS', 5.50)">3 BOLAS<br>5,50€</button>
      <button class="product-btn" onclick="addItem('+ BOLA SUP', 1.50)">+ BOLA SUP<br>1,50€</button>
      <button class="product-btn" onclick="addItem('BOLACHA', 0.10)">BOLACHA<br>0,10€</button>
      <button class="product-btn" onclick="addItem('CONE', 0.70)">CONE<br>0,70€</button>
      <button class="product-btn kg-btn" onclick="openKgPopup()">GELADO AO KG<br>Peso</button>
    </div>
  </section>

  <section id="frappe" class="section">
    <div class="products">
      <button class="product-btn" onclick="addItem('FRAPPE', 5.00)">FRAPPE<br>5,00€</button>
      <button class="product-btn" onclick="addItem('FRAPPE VEGAN', 6.00)">FRAPPE VEGAN<br>6,00€</button>
      <button class="product-btn" onclick="addItem('AGUA S/ GAS', 1.50)">AGUA S/ GAS<br>1,50€</button>
      <button class="product-btn" onclick="addItem('AGUA C/ GAS', 1.50)">AGUA C/ GAS<br>1,50€</button>
    </div>
  </section>

  <section id="cafe" class="section">
    <div class="products">
      <button class="product-btn" onclick="addItem('EXPRESSO', 1.50)">EXPRESSO<br>1,50€</button>
      <button class="product-btn" onclick="addItem('DUPLO', 3.00)">DUPLO<br>3,00€</button>
      <button class="product-btn" onclick="addItem('LUNGO', 2.00)">LUNGO<br>2,00€</button>
      <button class="product-btn" onclick="addItem('AMERICANO', 1.60)">AMERICANO<br>1,60€</button>
      <button class="product-btn" onclick="addItem('CAPPUCCINO', 3.00)">CAPPUCCINO<br>3,00€</button>
      <button class="product-btn" onclick="addItem('CAFÉ COM BOLA', 3.00)">CAFÉ COM BOLA<br>3,00€</button>
      <button class="product-btn" onclick="addItem('CAFE SPECIALTY', 2.00)">CAFE SPECIALTY<br>2,00€</button>
      <button class="product-btn" onclick="addItem('RIO', 2.00)">RIO<br>2,00€</button>
      <button class="product-btn" onclick="addItem('VICTORIA', 2.00)">VICTORIA<br>2,00€</button>
      <button class="product-btn" onclick="addItem('SIGNATURE', 2.00)">SIGNATURE<br>2,00€</button>
      <button class="product-btn" onclick="addItem('AFFOGATO', 5.00)">AFFOGATO<br>5,00€</button>
      <button class="product-btn" onclick="addItem('DECA', 1.80)">DECA<br>1,80€</button>
    </div>
  </section>

  <div class="cart">
    <div class="cart-title">
      <h2>Pedido atual</h2>
      <span id="count">0 artigos</span>
    </div>
    <div id="cartItems"></div>
    <div class="total" id="total">Total: 0,00€</div>
    <div class="actions">
      <button class="action-btn clear-btn" onclick="clearCart()">Novo pedido</button>
      <button class="action-btn save-btn" onclick="saveSale()">Guardar pedido</button>
    </div>
  </div>

  <div class="history">
    <h2>Histórico da sessão</h2>
    <div id="historyItems">Nenhum pedido guardado.</div>
    <button class="action-btn clear-btn" style="width:100%;margin-top:10px;" onclick="clearHistory()">Limpar histórico da sessão</button>
  </div>

  <dialog id="kgDialog">
    <h2>Gelado ao kg</h2>
    <label>Preço ao quilo (€)</label>
    <input id="kgPrice" type="number" step="0.01" value="26" />
    <label>Peso em gramas</label>
    <input id="kgWeight" type="number" step="1" placeholder="Ex: 250" />
    <div id="kgPreview" style="font-weight:bold;margin-bottom:12px;">Preço: 0,00€</div>
    <div class="dialog-buttons">
      <button onclick="closeKgPopup()">Cancelar</button>
      <button style="background:#22c55e" onclick="addKgItem()">Adicionar</button>
    </div>
  </dialog>

  <script>
    let cart = [];
    let history = JSON.parse(sessionStorage.getItem('caixa_historico_sessao') || '[]');

    function money(value) {
      return value.toFixed(2).replace('.', ',') + '€';
    }

    function showTab(id, btn) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    function addItem(name, price) {
      cart.push({ name, price });
      renderCart();
    }

    function removeItem(index) {
      cart.splice(index, 1);
      renderCart();
    }

    function renderCart() {
      const box = document.getElementById('cartItems');
      const count = document.getElementById('count');
      const totalBox = document.getElementById('total');
      const total = cart.reduce((sum, item) => sum + item.price, 0);

      count.textContent = cart.length + (cart.length === 1 ? ' artigo' : ' artigos');
      totalBox.textContent = 'Total: ' + money(total);

      if (cart.length === 0) {
        box.innerHTML = '<div style="color:#cbd5e1;padding:8px 0;">Nenhum artigo.</div>';
        return;
      }

      box.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <div>${item.name}</div>
          <strong>${money(item.price)}</strong>
          <button class="remove-btn" onclick="removeItem(${index})">X</button>
        </div>
      `).join('');
    }

    function clearCart() {
      cart = [];
      renderCart();
    }

    function saveSale() {
      if (cart.length === 0) return;
      const total = cart.reduce((sum, item) => sum + item.price, 0);
      const sale = {
        date: new Date().toLocaleString('pt-PT'),
        number: history.length + 1,
        total,
        items: cart.map(i => i.name)
      };
      history.unshift(sale);
      sessionStorage.setItem('caixa_historico_sessao', JSON.stringify(history));
      clearCart();
      renderHistory();
    }

    function renderHistory() {
      const box = document.getElementById('historyItems');
      if (history.length === 0) {
        box.textContent = 'Nenhum pedido guardado.';
        return;
      }
      box.innerHTML = history.map((sale, index) => `
        <div class="history-item">
          <strong>Pedido #${history.length - index}</strong> — ${sale.date} — ${money(sale.total)}<br>
          ${sale.items.join(', ')}
        </div>
      `).join('');
    }

    function clearHistory() {
      if (!confirm('Limpar todo o histórico desta sessão?')) return;
      history = [];
      sessionStorage.removeItem('caixa_historico_sessao');
      renderHistory();
    }

    function openKgPopup() {
      document.getElementById('kgWeight').value = '';
      updateKgPreview();
      document.getElementById('kgDialog').showModal();
      setTimeout(() => document.getElementById('kgWeight').focus(), 100);
    }

    function closeKgPopup() {
      document.getElementById('kgDialog').close();
    }

    function getKgPrice() {
      const priceKg = parseFloat(document.getElementById('kgPrice').value || '0');
      const grams = parseFloat(document.getElementById('kgWeight').value || '0');
      return (priceKg * grams) / 1000;
    }

    function updateKgPreview() {
      document.getElementById('kgPreview').textContent = 'Preço: ' + money(getKgPrice());
    }

    function addKgItem() {
      const grams = parseFloat(document.getElementById('kgWeight').value || '0');
      const price = getKgPrice();
      if (grams <= 0 || price <= 0) return;
      addItem('GELADO AO KG - ' + grams + 'g', price);
      closeKgPopup();
    }

    document.getElementById('kgPrice').addEventListener('input', updateKgPreview);
    document.getElementById('kgWeight').addEventListener('input', updateKgPreview);

    renderCart();
    renderHistory();
  </script>
</body>
</html>
